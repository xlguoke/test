<?xml version="1.0" encoding="UTF-8"?>
<svg width="96px" height="96px" viewBox="0 0 96 96" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <title>入库登记</title>
    <defs>
        <linearGradient x1="0%" y1="0%" x2="100%" y2="100%" id="storageInGradient">
            <stop stop-color="#34D399" offset="0%"></stop>
            <stop stop-color="#059669" offset="100%"></stop>
        </linearGradient>
    </defs>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect fill="url(#storageInGradient)" x="0" y="0" width="96" height="96" rx="22"></rect>
        <g transform="translate(22, 22)">
            <!-- 文档/箱子图标 - 圆润 -->
            <rect x="4" y="6" width="36" height="36" rx="6" stroke="#FFFFFF" stroke-width="3" fill="none"></rect>
            <line x1="12" y1="16" x2="32" y2="16" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>
            <line x1="12" y1="24" x2="28" y2="24" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"></line>
            <!-- 入库箭头 - 弯曲柔和风格 -->
            <circle cx="40" cy="40" r="10" fill="#FFFFFF" opacity="0.95"></circle>
            <path d="M40 34V46" stroke="#059669" stroke-width="2.5" stroke-linecap="round"></path>
            <path d="M35 40C35 40 37 34 40 34C43 34 45 40 45 40" stroke="#059669" stroke-width="2.5" stroke-linecap="round" fill="none"></path>
