        </linearGradient>
    </defs>
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <rect fill="url(#acceptanceGradient)" x="0" y="0" width="96" height="96" rx="22"></rect>
        <g transform="translate(22, 22)">
            <!-- 文档图标 - 圆润风格 -->
            <rect x="6" y="4" width="32" height="40" rx="6" stroke="#FFFFFF" stroke-width="3" fill="none"></rect>
            <line x1="14" y1="14" x2="30" y2="14" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"></line>
            <line x1="14" y1="22" x2="26" y2="22" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7"></line>
